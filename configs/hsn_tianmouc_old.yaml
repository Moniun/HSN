project: tianmouc_hsn

data:
  root: ./data/nfs
  train_split: train
  val_split: val

  raw_cop_size: [320, 640]
  raw_aop_size: [160, 160]

  content_size: [256, 512]
  padded_size: [296, 552]

  cop_channels: 3
  aop_channels: 3
  box_format: xyxy
  min_box_size: 2

  cop_step: 10

  ann_cache_files: 16
  hsn_cache_files: 4

model:
  cop_channels: 3
  aop_channels: 3
  feature_channels: 512

  anchor_stride: 8
  anchor_scales: [8, 16, 32, 64, 96]
  anchor_ratios: [0.5, 1.0, 2.0]

  spike_threshold: 1.0
  spike_decay: 0.5
  template_context: 0.35

loss:
  pos_iou: 0.35
  neg_iou: 0.15

  cls_weight: 1.0
  reg_weight: 1.0
  feat_weight: 1.0
  reg_feature_weight: 0.0001

  pos_weight: 1.0
  neg_pos_ratio: 10
  min_neg: 512

  reg_beta: 1.0

  rank_weight: 0.2
  rank_margin: 0.2
  rank_topk_neg: 64
  rank_warmup_epochs: 3

train:
  out_dir: ./runs/tianmouc_hsn

  epochs_ann: 8
  epochs_hsn: 20

  ann_batch_size: 32
  hsn_batch_size: 8

  lr: 0.0001
  head_lr: 0.0001
  weight_decay: 0.01

  freeze_head_epochs: 0

  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4

  amp: true

  ann_sequential: true
  hsn_sequential: true

checkpoint:
  ann_pretrained: ./runs/tianmouc_hsn/ann_last.pt